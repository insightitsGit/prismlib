name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]

jobs:
  test:
    name: Test Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run tests
        run: pytest --tb=short -q --cov=prism --cov-report=xml

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: coverage.xml
          fail_ci_if_error: false

  benchmark-smoke:
    name: Benchmark smoke test
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install benchmark deps
        run: pip install -e ".[dev]" && pip install -r benchmark/requirements.txt

      - name: Start benchmark app (background)
        run: |
          python -m uvicorn benchmark.app.main:app --host 127.0.0.1 --port 8000 &
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:8000/health >/dev/null; then
              echo "App healthy"
              exit 0
            fi
            sleep 2
          done
          echo "App failed to become healthy"
          exit 1
        env:
          PRISM_BENCHMARK_SMOKE: "1"

      - name: Run smoke benchmark (no Azure, in-memory only)
        run: python benchmark/load/run_benchmark.py --scenario smoke --duration 30 --no-azure --host http://127.0.0.1:8000
        env:
          PRISM_BENCHMARK_SMOKE: "1"
